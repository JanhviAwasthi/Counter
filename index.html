<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Checker</title>
    
</head>
<body>
    <h1>Temperature Converter</h1>
    <p>Enter a temperature</p>
    <input type="number" id="temperatureInput" placeholder="Enter temperature">
    <p>Convert to:</p>
    <input type="radio" id="celsius" name="conversion" value="celsius">
    <label for="celsius">Celsius</label>
    <input type="radio" id="fahrenheit" name="conversion" value="fahrenheit">
    <label for="fahrenheit">Fahrenheit</label>
    <button id="convertButton">Convert</button>
    <p id="result">Result</p>

    <script src="script.js"></script>
</body>
</html>
